<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="良い指示を作る5要素を説明する、編集可能なHTMLスライド">
  <title>良い指示の5要素｜編集可能HTML</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;800&amp;display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --accent: #4b78bb;
      --ink: #14243d;
      --muted: #647287;
      --line: #d7e1ee;
      --card: #f8fafc;
      --card-accent: #f4f8ff;
      --page: #e7ecf3;
      --slide-width: 1920;
      --slide-height: 1080;
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      background: var(--page);
      color: var(--ink);
      font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif;
    }

    button { font: inherit; }

    .toolbar {
      position: sticky;
      z-index: 10;
      top: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      min-height: 64px;
      padding: 12px clamp(16px, 3vw, 36px);
      border-bottom: 1px solid #d6deea;
      background: rgba(255, 255, 255, .96);
      box-shadow: 0 4px 18px rgba(20, 36, 61, .08);
      backdrop-filter: blur(10px);
    }

    .toolbar__title {
      margin-right: auto;
      font-size: 15px;
      font-weight: 800;
    }

    .toolbar__hint {
      flex: 1 1 100%;
      margin: 0;
      color: #66758a;
      font-size: 12px;
      line-height: 1.5;
    }

    .control {
      min-height: 38px;
      padding: 8px 14px;
      border: 1px solid #c9d4e2;
      border-radius: 9px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
    }

    .control:hover { background: #f5f8fc; }
    .control:focus-visible { outline: 3px solid rgba(75, 120, 187, .35); outline-offset: 2px; }
    .control--primary { border-color: var(--accent); background: var(--accent); color: #fff; }
    .control--primary:hover { background: #3d68a9; }

    .stage {
      display: grid;
      min-height: calc(100vh - 64px);
      place-items: center;
      padding: clamp(16px, 4vw, 56px);
    }

    .slide-frame {
      container-type: inline-size;
      width: min(100%, calc((100vh - 152px) * 16 / 9));
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border-radius: clamp(8px, 1vw, 18px);
      background: #fff;
      box-shadow: 0 24px 70px rgba(33, 51, 77, .2);
    }

    .slide {
      width: 100%;
      height: 100%;
      padding: 6.6667% 4.5833%;
      overflow: hidden;
      background: #fff;
    }

    .kicker {
      display: flex;
      align-items: center;
      gap: .84cqw;
      color: var(--accent);
      font-size: 1.3cqw;
      font-weight: 700;
      letter-spacing: .08em;
      line-height: 1.4;
    }

    .kicker::before {
      width: 2.08cqw;
      height: max(1px, .16cqw);
      background: var(--accent);
      content: "";
    }

    h1 {
      margin: 3.89% 0 0;
      font-size: 3.02cqw;
      letter-spacing: -.02em;
      line-height: 1.24;
    }

    .accent { color: var(--accent); }

    .five {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 1.25cqw;
      margin-top: 6.12%;
    }

    .card {
      min-width: 0;
      height: 23.7cqw;
      padding: 2.19cqw 1.77cqw;
      border: max(1px, .1cqw) solid var(--line);
      border-radius: 1.46cqw;
      background: var(--card);
    }

    .card:first-child {
      border-color: var(--accent);
      background: var(--card-accent);
    }

    .num {
      color: var(--accent);
      font-size: 3.54cqw;
      font-weight: 800;
      line-height: 1;
    }

    .rule {
      width: 2.4cqw;
      height: max(1px, .16cqw);
      margin: 1.46cqw 0 1.25cqw;
      background: var(--accent);
    }

    .label {
      font-size: 1.72cqw;
      font-weight: 800;
      line-height: 1.25;
      white-space: nowrap;
    }

    .desc {
      margin-top: 1.35cqw;
      color: var(--muted);
      font-size: 1.4cqw;
      font-weight: 500;
      line-height: 1.45;
    }

    [data-editable] { border-radius: 4px; }

    body.is-editing [data-editable] {
      outline: 2px dashed rgba(75, 120, 187, .65);
      outline-offset: 5px;
      cursor: text;
    }

    body.is-editing [data-editable]:focus {
      outline-style: solid;
      background: rgba(255, 244, 182, .48);
    }

    body.presentation .toolbar { display: none; }
    body.presentation .stage { min-height: 100vh; padding: 0; }
    body.presentation .slide-frame { width: min(100vw, calc(100vh * 16 / 9)); max-height: 100vh; border-radius: 0; box-shadow: none; }

    .status {
      min-width: 7em;
      color: #66758a;
      font-size: 12px;
      text-align: right;
    }

    @media (max-width: 720px) {
      .toolbar__title { flex: 1 1 100%; }
      .toolbar__hint { display: none; }
      .stage { min-height: auto; padding: 12px; }
      .slide-frame { width: 100%; }
      .card { border-radius: 7px; }
      .status { display: none; }
    }

    @media print {
      @page { size: 16in 9in; margin: 0; }
      body { background: #fff; }
      .toolbar { display: none; }
      .stage { min-height: 0; padding: 0; }
      .slide-frame { width: 16in; height: 9in; border-radius: 0; box-shadow: none; }
    }
  </style>
</head>
<body>
  <header class="toolbar" aria-label="編集ツール">
    <div class="toolbar__title">良い指示の5要素｜編集可能HTML</div>
    <button class="control control--primary" id="editButton" type="button" aria-pressed="false">編集モード</button>
    <button class="control" id="saveButton" type="button">この端末に保存</button>
    <button class="control" id="downloadButton" type="button">HTMLを保存</button>
    <button class="control" id="resetButton" type="button">元に戻す</button>
    <button class="control" id="presentButton" type="button">全画面表示</button>
    <span class="status" id="status" role="status" aria-live="polite"></span>
    <p class="toolbar__hint">「編集モード」を押すと文字を直接変更できます。この端末への保存はブラウザ内だけに反映され、GitHub上の原本は変わりません。</p>
  </header>

  <main class="stage">
    <div class="slide-frame">
      <section class="slide" id="editableSlide" aria-label="良い指示の5要素">
        <div class="kicker" data-editable data-key="kicker">第3章　基本的な使い方</div>
        <h1 data-editable data-key="title">良い指示は「<span class="accent">目的・対象者・参考資料・完成形式・制約</span>」の5要素</h1>

        <div class="five">
          <article class="card">
            <div class="num">1</div>
            <div class="rule" aria-hidden="true"></div>
            <div class="label" data-editable data-key="label-1">目的</div>
            <div class="desc" data-editable data-key="desc-1">達成したい<br>ゴール</div>
          </article>
          <article class="card">
            <div class="num">2</div>
            <div class="rule" aria-hidden="true"></div>
            <div class="label" data-editable data-key="label-2">対象者</div>
            <div class="desc" data-editable data-key="desc-2">誰に<br>読ませるか</div>
          </article>
          <article class="card">
            <div class="num">3</div>
            <div class="rule" aria-hidden="true"></div>
            <div class="label" data-editable data-key="label-3">参考資料</div>
            <div class="desc" data-editable data-key="desc-3">元にする<br>情報</div>
          </article>
          <article class="card">
            <div class="num">4</div>
            <div class="rule" aria-hidden="true"></div>
            <div class="label" data-editable data-key="label-4">完成形式</div>
            <div class="desc" data-editable data-key="desc-4">何を<br>作るか</div>
          </article>
          <article class="card">
            <div class="num">5</div>
            <div class="rule" aria-hidden="true"></div>
            <div class="label" data-editable data-key="label-5">制約条件</div>
            <div class="desc" data-editable data-key="desc-5">避けること<br>注意点</div>
          </article>
        </div>
      </section>
    </div>
  </main>

  <script>
    (() => {
      const storageKey = "editable-five-elements-slide-v1";
      const editButton = document.querySelector("#editButton");
      const saveButton = document.querySelector("#saveButton");
      const downloadButton = document.querySelector("#downloadButton");
      const resetButton = document.querySelector("#resetButton");
      const presentButton = document.querySelector("#presentButton");
      const status = document.querySelector("#status");
      const editableElements = [...document.querySelectorAll("[data-editable]")];
      const originalContent = Object.fromEntries(editableElements.map((element) => [element.dataset.key, element.innerHTML]));

      const setStatus = (message) => {
        status.textContent = message;
        window.clearTimeout(setStatus.timer);
        setStatus.timer = window.setTimeout(() => { status.textContent = ""; }, 2600);
      };

      const readContent = () => Object.fromEntries(
        editableElements.map((element) => [element.dataset.key, element.innerHTML])
      );

      const applyContent = (content) => {
        editableElements.forEach((element) => {
          if (typeof content[element.dataset.key] === "string") {
            element.innerHTML = content[element.dataset.key];
          }
        });
      };

      const setEditMode = (enabled) => {
        document.body.classList.toggle("is-editing", enabled);
        editButton.setAttribute("aria-pressed", String(enabled));
        editButton.textContent = enabled ? "編集を終了" : "編集モード";
        editableElements.forEach((element) => {
          element.contentEditable = String(enabled);
          element.spellcheck = enabled;
        });
        if (enabled) editableElements[0].focus();
      };

      const saveLocally = () => {
        localStorage.setItem(storageKey, JSON.stringify(readContent()));
        setStatus("保存しました");
      };

      const downloadHtml = () => {
        const clone = document.documentElement.cloneNode(true);
        const current = readContent();
        clone.querySelectorAll("[data-editable]").forEach((element) => {
          element.innerHTML = current[element.dataset.key] ?? element.innerHTML;
          element.removeAttribute("contenteditable");
          element.removeAttribute("spellcheck");
        });
        clone.querySelector("body").classList.remove("is-editing", "presentation");
        const blob = new Blob(["<!doctype html>\n" + clone.outerHTML], { type: "text/html;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "five-elements-slide.html";
        link.click();
        URL.revokeObjectURL(url);
        setStatus("HTMLを保存しました");
      };

      editButton.addEventListener("click", () => setEditMode(!document.body.classList.contains("is-editing")));
      saveButton.addEventListener("click", saveLocally);
      downloadButton.addEventListener("click", downloadHtml);
      resetButton.addEventListener("click", () => {
        if (!window.confirm("この端末に保存した編集内容を消して、元の文言に戻しますか？")) return;
        localStorage.removeItem(storageKey);
        applyContent(originalContent);
        setStatus("元に戻しました");
      });
      presentButton.addEventListener("click", () => {
        setEditMode(false);
        document.body.classList.add("presentation");
        document.documentElement.requestFullscreen?.();
      });

      document.addEventListener("fullscreenchange", () => {
        if (!document.fullscreenElement) document.body.classList.remove("presentation");
      });

      document.addEventListener("keydown", (event) => {
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "s") {
          event.preventDefault();
          saveLocally();
        }
        if (event.key === "Escape" && document.body.classList.contains("presentation")) {
          document.body.classList.remove("presentation");
        }
      });

      try {
        const stored = JSON.parse(localStorage.getItem(storageKey) || "null");
        if (stored) {
          applyContent(stored);
          setStatus("保存内容を読み込みました");
        }
      } catch {
        localStorage.removeItem(storageKey);
      }

      if (new URLSearchParams(location.search).get("present") === "1") {
        document.body.classList.add("presentation");
      }
    })();
  </script>
</body>
</html>
